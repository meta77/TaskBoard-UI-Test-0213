<!DOCTYPE html>
<html lang="ja">

<head>
  <meta charset="UTF-8">
  <meta name="viewport"
    content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, interactive-widget=resizes-content">
  <title>Minimal Board - Separated</title>
  <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="style.css">
</head>

<body>

  <div id="app" class="board-container">
    <header class="app-header">
      <h1 class="title-main">Engineering Sprint <span class="title-sub">2026-Q1</span></h1>
      <div class="flex items-center gap-4">
        <span class="text-[9px] text-zinc-600 font-mono hidden sm:inline">ENCRYPTED SESSION</span>
        <button @click="addTask" class="btn-new">New Ticket</button>
      </div>
    </header>

    <!-- Responsive Board Layout: Mobile (Horizontal Scroll) -> Desktop (Grid) -->
    <div
      class="flex overflow-x-auto snap-x snap-mandatory gap-4 pb-4 lg:grid lg:grid-cols-5 lg:pb-0 lg:overflow-visible">
      <div v-for="col in columns" :key="col.id"
        class="flex flex-col flex-none w-[85vw] snap-center md:w-[45vw] lg:w-auto">
        <div class="column-header">
          <h2 class="column-title">{{ col.name }}</h2>
          <span class="column-count">{{ getTasksByStatus(col.id).length }}</span>
        </div>

        <div class="h-full" @dragover.prevent @drop="onDrop($event, col.id)">
          <div v-for="task in getTasksByStatus(col.id)" :key="task.id" @click="openModal(task)" draggable="true"
            @dragstart="onDragStart(task.id)" @drop.stop="onDrop($event, col.id, task.id)" class="task-card"
            :class="{ 'opacity-50': draggedTaskId === task.id }">
            <div class="task-meta">
              <span class="task-key">{{ task.key }}</span>
              <div v-if="task.priority === 'high'" class="task-priority-dot"></div>
            </div>
            <h3 class="task-title">{{ task.title }}</h3>
            <div class="task-footer">
              <div class="task-assignee">{{ task.assignee }}</div>
              <div class="task-date">{{ task.dueDate }}</div>
            </div>

            <!-- モバイル専用：クイック移動ボタン -->
            <div class="mobile-controls lg:hidden">
              <div class="flex justify-between items-center mt-3 pt-2 border-t border-zinc-800/50">
                <div class="flex gap-1">
                  <button @click.stop="quickMove(task.id, 'left')" class="move-btn">←</button>
                  <button @click.stop="quickMove(task.id, 'right')" class="move-btn">→</button>
                </div>
                <div class="flex gap-1">
                  <button @click.stop="quickMove(task.id, 'up')" class="move-btn">↑</button>
                  <button @click.stop="quickMove(task.id, 'down')" class="move-btn">↓</button>
                </div>
              </div>
            </div>
          </div>

          <div v-if="getTasksByStatus(col.id).length === 0" class="empty-state">
            No Items
          </div>
        </div>
      </div>
    </div>
    <!-- Modal Overlay -->
    <div v-if="isModalOpen" class="modal-overlay" @click.self="closeModal">
      <div class="modal-content">
        <div class="modal-header">
          <h2 class="modal-title">{{ isEditing ? getTaskKey(currentTask) : 'Create Issue' }}</h2>
          <button @click="closeModal" class="modal-close">&times;</button>
        </div>

        <div class="modal-body">
          <div class="form-group">
            <label>Summary</label>
            <input v-model="currentTask.title" type="text" class="form-input" placeholder="What needs to be done?">
          </div>

          <div class="form-row">
            <div class="form-group">
              <label>Status</label>
              <select v-model="currentTask.status" class="form-select">
                <option v-for="col in columns" :key="col.id" :value="col.id">{{ col.name }}</option>
              </select>
            </div>

            <div class="form-group">
              <label>Priority</label>
              <select v-model="currentTask.priority" class="form-select">
                <option value="low">Low</option>
                <option value="medium">Medium</option>
                <option value="high">High</option>
              </select>
            </div>
          </div>

          <div class="form-row">
            <div class="form-group">
              <label>Assignee</label>
              <input v-model="currentTask.assignee" type="text" class="form-input" placeholder="Initials">
            </div>
            <div class="form-group">
              <label>Due Date</label>
              <input v-model="currentTask.dueDate" type="text" class="form-input" placeholder="MM.DD">
            </div>
          </div>

          <div class="form-group">
            <label>Description</label>
            <textarea v-model="currentTask.description" class="form-textarea" rows="4"
              placeholder="Add a description..."></textarea>
          </div>
        </div>

        <div class="modal-footer">
          <button @click="closeModal" class="btn-cancel">Cancel</button>
          <button @click="saveTask" class="btn-save">{{ isEditing ? 'Save' : 'Create' }}</button>
        </div>
      </div>
    </div>
  </div>

  <script type="module">
    import { useTaskApp } from './app.js';
    const { createApp } = Vue;

    createApp({
      setup() {
        return useTaskApp();
      }
    }).mount('#app');
  </script>
</body>

</html>
